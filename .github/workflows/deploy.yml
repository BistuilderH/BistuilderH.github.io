name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时自动触发部署
  push:
    branches: [main]
  # 允许在 GitHub 网页的 Actions 页面手动点击运行
  workflow_dispatch:

# 授予这个 workflow 部署 Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的推送会取代还在排队的旧任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（把仓库代码拉到虚拟机上）
        uses: actions/checkout@v4
      - name: Build（用官方 Action 装依赖并编译成静态 HTML）
        uses: withastro/action@v3
        # withastro/action 会自动检测 package-lock.json 并使用 npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy（把编译好的 HTML 发布到 GitHub Pages）
        id: deployment
        uses: actions/deploy-pages@v4
